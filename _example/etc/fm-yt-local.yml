feeds:
  yt-example:
    title: Some cool channels
    description: an example of youtube-based podcas
    link: http://localhost:8080/feed/yt-example
    language: "ru-ru"
    image: images/yt-example.png
    sources:
      - {name: "Точка", url: http://localhost:8080/yt/rss/PLZVQqcKxEn_6YaOniJmxATjODSVUbbMkd}
      - {name: "Живой Гвоздь", url: http://localhost:8080/yt/rss/UCWAIvx2yYLK_xTYD4F2mUNw}
      - {name: "Дилетант", url: http://localhost:8080/yt/rss/UCuIE7-5QzeAR6EdZXwDRwuQ}


youtube:
  base_url: http://localhost:8080/yt/media
  dl_template: yt-dlp --extract-audio --audio-format=mp3 --audio-quality=0 -f m4a/bestaudio "https://www.youtube.com/watch?v={{.ID}}" --no-progress -o {{.FileName}}
  base_chan_url: "https://www.youtube.com/feeds/videos.xml?channel_id="
  base_playlist_url: "https://www.youtube.com/feeds/videos.xml?playlist_id="
  update: 60s
  max_per_channel: 2
  files_location: ./var/yt
  rss_location: ./var/rss
  channels:
  - {id: UCWAIvx2yYLK_xTYD4F2mUNw, name: "Живой Гвоздь", lang: "ru-ru"}
  - {id: UCuIE7-5QzeAR6EdZXwDRwuQ, name: "Дилетант", type: "channel", lang: "ru-ru"}
  - {id: PLZVQqcKxEn_6YaOniJmxATjODSVUbbMkd, name: "Точка", type: "playlist", lang: "ru-ru"}

system:
  update: 1m
  max_per_feed: 10
  max_total: 50
  max_keep: 1000
  base_url: http://localhost:8080

# transcription -> LLM -> Notion pipeline (/md and /notes bot commands)
# secrets via env: GROQ_API_KEY (required), NOTION_TOKEN (for /notes L2),
# LLM_API_KEY (optional override when llm_base_url points to another provider)
notes:
  enabled: true
  md_location: ./var/md            # L1 markdown transcripts
  whisper_model: whisper-large-v3  # Groq Whisper model
  llm_model: llama-3.3-70b-versatile
  llm_base_url: ""                 # OpenAI-compatible endpoint, default Groq
  notion_parent_page: ""           # Notion page ID to create databases under
  concurrency: 1                   # notes worker pool size (max 2, Groq rate limits)
  chunk_seconds: 600               # audio chunk length for transcription

# reading layer: an article URL → structural markdown (headings/lists/links
# kept) + archived raw HTML, listed via /read. Independent of notes: works
# without Groq (LLM tags are optional and degrade gracefully).
read:
  enabled: true
  location: ./var/read             # where {id}.md and {id}.html live
  alias: ""                        # reserved wayfinding alias for a future reading feed
